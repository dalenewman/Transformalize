name: NuGet Publish
run-name: Manual NuGet Publish (Run ${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      publish_nuget:
        description: "Push to NuGet.org"
        required: true
        default: true
        type: boolean
      publish_myget:
        description: "Push to MyGet Transformalize feed"
        required: true
        default: false
        type: boolean

jobs:
  pack-and-publish:
    name: Pack and Publish NuGet Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      MYGET_API_KEY: ${{ secrets.MYGET_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack NuGet modules
        run: ./scripts/nuget-pack.sh

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-run-${{ github.run_number }}
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

      - name: Push to NuGet.org
        if: ${{ inputs.publish_nuget && env.NUGET_API_KEY != '' }}
        run: ./scripts/nuget-push.sh --source nuget --api-key-env NUGET_API_KEY

      - name: Push to MyGet
        if: ${{ inputs.publish_myget && env.MYGET_API_KEY != '' }}
        run: ./scripts/nuget-push.sh --source myget --api-key-env MYGET_API_KEY
